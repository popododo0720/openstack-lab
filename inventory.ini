[all]
stack1 ansible_host=127.0.0.1 ansible_port=22011 storage_ip=192.168.73.11 internal_ip=192.168.0.11 tunnel_ip=192.168.0.11 external_ip=10.2.44.101
stack2 ansible_host=127.0.0.1 ansible_port=22012 storage_ip=192.168.73.12 internal_ip=192.168.0.12 tunnel_ip=192.168.0.12 external_ip=10.2.44.102
stack3 ansible_host=127.0.0.1 ansible_port=22013 storage_ip=192.168.73.13 internal_ip=192.168.0.13 tunnel_ip=192.168.0.13 external_ip=10.2.44.103

[all:vars]
ansible_user=root
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# 네트워크 대역
management_enabled=false
storage_network=192.168.73.0/24
internal_network=192.168.0.0/24
tunnel_network=192.168.0.0/24
external_network=10.2.44.0/22
management_network=

# Kolla VIP
kolla_internal_vip_address=192.168.0.10
kolla_external_vip_address=10.2.44.110
#kolla_internal_fqdn=internal.openstack.local
#kolla_external_fqdn=public.openstack.local
#vminsert_fqdn=vminsert.monitoring.local

# 네트워크 인터페이스 (스위치 이중화 대비 전체 bond 구조)
# 현재는 대부분 slave 1개짜리 bond로 시작하고, 추후 NIC/스위치 추가 시 *_bond_interfaces 에 slave만 추가
# bond-external: 10.2.44.x / VIP 10.2.44.110
# bond-internal: 192.168.0.x / VIP 192.168.0.10 / tunnel
# bond-storage:  192.168.73.x / Ceph storage
# bond-mgmt:     disabled here; Ansible uses bond-external 10.2.44.x
# bond-provider: br-ex uplink / Neutron provider VLAN trunk / IP 없음
management_interface=bond-mgmt
management_bond_interfaces=eno2np1
management_bond_primary=eno2np1
management_bond_mode=active-backup
external_interface=bond-external
external_bond_interfaces=eno17395np0
external_bond_primary=eno17395np0
external_bond_mode=active-backup
network_interface=bond-internal
internal_bond_interfaces=eno17415np2
internal_bond_primary=eno17415np2
internal_bond_mode=active-backup
kolla_external_vip_interface=bond-external
kolla_internal_vip_interface=bond-internal
neutron_external_interface=bond-provider
neutron_external_bond_interfaces=eno17405np1
neutron_external_bond_primary=eno17405np1
neutron_external_bond_mode=active-backup
neutron_bridge_name=br-ex
neutron_physical_networks=external
# Single uplink VLAN provider mode:
# bond-provider -> br-ex -> physnet external
# VLAN 100 = primary/public external-net
# VLAN 200 = optional secondary/private external-net
neutron_network_vlan_ranges=external:1:4094
tunnel_interface=bond-internal
storage_interface=bond-storage
storage_bond_interfaces=eno17425np3
storage_bond_primary=eno17425np3
storage_bond_mode=active-backup
external_gateway=10.2.47.254

# Ceph OSD 디스크 (쉼표 구분, 추가 시 여기에)
# 예: osd_devices=/dev/sdb,/dev/sdc,/dev/sdd,/dev/sde,/dev/sdf
osd_devices=/dev/sdb,/dev/sdc,/dev/sdd,/dev/sde,/dev/sdf

# Kolla 설정
kolla_version=stable/2025.1
admin_password=CHANGEME_PASSWORD

# Docker Registry (로컬 이미지 레지스트리)
local_registry=localhost:15001
repo_base_url=https://localhost:10443
terraform_repo_base_url=https://localhost:10443

# Cinder NFS shares
# 여러 export를 쓸 경우 쉼표로 구분
#cinder_nfs_shares=10.250.254.1:/DATA/nfs/cinder

# DNS server
site_dns_servers=203.246.80.1

# NTP server
site_ntp_servers=10.2.47.40

# terraform
terraform_external_allocation_pools=10.2.44.120-10.2.44.199
terraform_external_provider_network_type=vlan
terraform_external_provider_physical_network=external
terraform_external_provider_segmentation_id=40
terraform_internal_network_cidr=192.168.0.0/24
terraform_internal_gateway_ip=192.168.0.1
terraform_octavia_provider=amphora
