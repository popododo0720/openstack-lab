# FXHCI override: converged 3-node cluster (stack1/2/3 = full hacluster members,
# no pacemaker-remote/dedicated compute nodes). kolla default restrict_to_remotes=true
# monitors ONLY remote nodes -> empty here -> host failure never detected/evacuated.
# false => hostmonitor watches cluster members. Keep disable_ipmi_check=true (no BMC LAN).
[host]
restrict_to_remotes = false
