    - name: "globals.yml 확인"
      shell: grep -E "^(network_interface|kolla_external_vip|kolla_internal_vip|neutron_external)" /etc/kolla/globals.yml
      register: globals_check

    - name: "설정 확인"
      debug:
        msg: "{{ globals_check.stdout_lines }}"

    - name: "multinode 확인"
      command: cat /root/multinode
      register: multinode_check

    - name: "패스워드 생성 (kolla-genpwd)"
      shell: source /root/kolla-venv/bin/activate && kolla-genpwd
      args:
        executable: /bin/bash
        creates: /etc/kolla/.passwords_generated

    - name: "패스워드 생성 완료 마커"
      file:
        path: /etc/kolla/.passwords_generated
        state: touch

    - name: "passwords.yml 읽기"
      slurp:
        src: /etc/kolla/passwords.yml
      register: kolla_passwords_file

    - name: "필수 Kolla 비밀번호 확인"
      assert:
        that:
          - (kolla_passwords_file.content | b64decode | regex_search('(?m)^database_password:\\s*\\S+'))
          - (kolla_passwords_file.content | b64decode | regex_search('(?m)^rabbitmq_password:\\s*\\S+'))
        fail_msg: >-
          /etc/kolla/passwords.yml 에 필수 비밀번호가 비어 있습니다.
          기존 배포 환경이면 예전 passwords.yml 을 먼저 복구해야 합니다.

    - name: "TLS 인증서 생성"
      shell: source /root/kolla-venv/bin/activate && kolla-ansible certificates -i /root/multinode
      args:
        executable: /bin/bash

    - name: "admin 비밀번호 고정 (coremax1@#)"
      lineinfile:
        path: /etc/kolla/passwords.yml
        regexp: '^keystone_admin_password:'
        line: 'keystone_admin_password: coremax1@#'


    - name: "OpenStack Exporter 커스텀 설정 디렉토리 생성"
      file:
        path: /etc/kolla/config/prometheus-openstack-exporter
        state: directory
        mode: "0755"

    - name: "OpenStack Exporter clouds.yml 템플릿 고정"
      copy:
        dest: /etc/kolla/config/prometheus-openstack-exporter/clouds.yml
        mode: "0640"
        content: |
          clouds:
            default:
              region_name: RegionOne
              identity_api_version: 3
              identity_interface: internal
              volume_api_version: 3
              auth:
                username: admin
                password: {{ admin_password }}
                project_name: admin
                project_domain_name: 'Default'
                user_domain_name: 'Default'
                cacert: /etc/ssl/certs/ca-certificates.crt
                auth_url: https://{{ kolla_internal_vip_address }}:5000

    - name: "OpenStack Exporter 템플릿 소스 확인"
      shell: grep -n 'password:' /etc/kolla/config/prometheus-openstack-exporter/clouds.yml
      register: exporter_template_check
      changed_when: false

    - name: "OpenStack Exporter 템플릿 확인 출력"
      debug:
        msg: "{{ exporter_template_check.stdout_lines }}"

- name: "Kolla 서비스별 커스텀 설정 배포"
  hosts: stack1
  become: yes

  tasks:
    - name: "Grafana 커스텀 대시보드 디렉토리 초기화"
      file:
        path: /etc/kolla/config/grafana/dashboards
        state: absent

    - name: "Grafana 커스텀 대시보드 디렉토리 생성"
      file:
        path: /etc/kolla/config/grafana/dashboards
        state: directory
        mode: "0755"

    - name: "Grafana 커스텀 대시보드 복사"
      copy:
        src: "{{ playbook_dir }}/grafana-dashboards/"
        dest: /etc/kolla/config/grafana/dashboards/
        mode: "0644"

    - name: "Grafana 커스텀 대시보드 배포 결과 확인"
      find:
        paths: /etc/kolla/config/grafana/dashboards
        file_type: file
        patterns: "*.json"
      register: grafana_dashboard_files

    - name: "Grafana 커스텀 대시보드 목록 출력"
      debug:
        msg: "{{ grafana_dashboard_files.files | map(attribute='path') | list }}"

    - name: "Grafana provisioning 설정 컨피그 추가"
      copy:
        src: "{{ playbook_dir }}/config/grafana/provisioning.yaml"
        dest: /etc/kolla/config/grafana/provisioning.yaml
        mode: "0644"  

    - name: "initialize prometheus directory"
      file:
        path: /etc/kolla/config/prometheus/prometheus.yml.d/
        state: absent

    - name: "Grafana 커스텀 대시보드 디렉토리 생성"
      file:
        path: /etc/kolla/config/prometheus/prometheus.yml.d/
        state: directory
        mode: "0755"

    - name: "Prometheus rabbitmq scraper"
      copy:
        src: "{{ playbook_dir }}/config/prometheus/"
        dest: /etc/kolla/config/ 
        mode: "0644"  

    - name: "Skyline nginx custom override 디렉토리 생성"
      file:
        path: /etc/kolla/config/skyline
        state: directory
        mode: "0755"

    - name: "Skyline nginx custom override 배포"
      copy:
        src: "{{ playbook_dir }}/config/skyline/nginx.conf"
        dest: /etc/kolla/config/skyline/nginx.conf
        mode: "0644"

    - name: "Skyline nginx custom override 배포 결과 확인"
      stat:
        path: /etc/kolla/config/skyline/nginx.conf
      register: skyline_nginx_override

    - name: "Skyline nginx custom override 경로 출력"
      debug:
        msg: "{{ skyline_nginx_override.stat.path }}"

- name: "Skyline 81 static UI 번들 배포"
  hosts: all
  become: yes

  tasks:
    - name: "Skyline static override 디렉토리 생성"
      file:
        path: /etc/kolla/config/skyline-static-81
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Skyline static override 파일 복사"
      copy:
        src: "{{ playbook_dir }}/config/skyline-static-81/"
        dest: /etc/kolla/config/skyline-static-81/
        owner: root
        group: root
        mode: preserve

- name: "VIP/FQDN 및 노드 hosts 매핑 배포"
  hosts: all
  become: yes

  tasks:
    - name: 루프백 hostname 엔트리 제거 (Kolla hostname unique resolution 보장)
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1\s+{{ item }}$'
        state: absent
      loop: "{{ groups['all'] }}"

    - name: 관리망 호스트명 hosts 엔트리
      lineinfile:
        path: /etc/hosts
        regexp: '^{{ hostvars[item].ansible_host | regex_escape }}\s+{{ item }}-mgmt$'
        line: "{{ hostvars[item].ansible_host }} {{ item }}-mgmt"
        state: present
      loop: "{{ groups['all'] }}"

    - name: 내부망 호스트명 hosts 엔트리
      lineinfile:
        path: /etc/hosts
        regexp: '^{{ hostvars[item].internal_ip | regex_escape }}\s+{{ item }}$'
        line: "{{ hostvars[item].internal_ip }} {{ item }}"
        state: present
      loop: "{{ groups['all'] }}"

    - name: 스토리지망 별칭 hosts 엔트리
      lineinfile:
        path: /etc/hosts
        regexp: '^{{ hostvars[item].storage_ip | regex_escape }}\s+{{ item }}-storage$'
        line: "{{ hostvars[item].storage_ip }} {{ item }}-storage"
        state: present
      loop: "{{ groups['all'] }}"

    - name: 외부망 별칭 hosts 엔트리
      lineinfile:
        path: /etc/hosts
        regexp: '^{{ hostvars[item].external_ip | regex_escape }}\s+{{ item }}-ext$'
        line: "{{ hostvars[item].external_ip }} {{ item }}-ext"
        state: present
      loop: "{{ groups['all'] }}"

    - name: 내부 VIP FQDN hosts 엔트리
      lineinfile:
        path: /etc/hosts
        regexp: '^{{ kolla_internal_vip_address | regex_escape }}\s+{{ kolla_internal_fqdn | regex_escape }}$'
        line: "{{ kolla_internal_vip_address }} {{ kolla_internal_fqdn }}"
        state: present
      when:
        - kolla_internal_fqdn is defined
        - (kolla_internal_fqdn | string | length) > 0

    - name: 외부 VIP FQDN hosts 엔트리
      lineinfile:
        path: /etc/hosts
        regexp: '^{{ kolla_external_vip_address | regex_escape }}\s+{{ kolla_external_fqdn | regex_escape }}$'
        line: "{{ kolla_external_vip_address }} {{ kolla_external_fqdn }}"
        state: present
      when:
        - kolla_external_fqdn is defined
        - (kolla_external_fqdn | string | length) > 0

- name: "배포노드 VIP/FQDN hosts 매핑"
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: 배포노드 내부 VIP FQDN hosts 엔트리
      lineinfile:
        path: /etc/hosts
        regexp: '^{{ kolla_internal_vip_address | regex_escape }}\s+{{ kolla_internal_fqdn | regex_escape }}$'
        line: "{{ kolla_internal_vip_address }} {{ kolla_internal_fqdn }}"
        state: present
      when:
        - kolla_internal_fqdn is defined
        - (kolla_internal_fqdn | string | length) > 0

    - name: 배포노드 외부 VIP FQDN hosts 엔트리
      lineinfile:
        path: /etc/hosts
        regexp: '^{{ kolla_external_vip_address | regex_escape }}\s+{{ kolla_external_fqdn | regex_escape }}$'
        line: "{{ kolla_external_vip_address }} {{ kolla_external_fqdn }}"
        state: present
      when:
        - kolla_external_fqdn is defined
        - (kolla_external_fqdn | string | length) > 0

- name: "Masakari custom config 배포 (restrict_to_remotes + sudoers)"
  hosts: stack1
  become: yes
  tasks:
    - name: "Masakari config 디렉토리 생성"
      file:
        path: /etc/kolla/config/masakari
        state: directory
        mode: "0755"

    - name: "Masakari restrict_to_remotes override 배포 (#2)"
      copy:
        src: "{{ playbook_dir }}/config/masakari/masakari-monitors.conf"
        dest: /etc/kolla/config/masakari/masakari-monitors.conf
        mode: "0644"

    - name: "Masakari sudoers (crmadmin/cibadmin) 배포 (#1)"
      copy:
        src: "{{ playbook_dir }}/config/masakari/kolla_masakari_monitors_sudoers"
        dest: /etc/kolla/config/masakari/kolla_masakari_monitors_sudoers
        mode: "0644"
